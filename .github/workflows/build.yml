name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-ci.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore

      # Вариант 1: framework-dependent, ОДИН файл (нужен установленный .NET Desktop Runtime, компактно)
      - name: Publish framework-dependent (single-file)
        run: >
          dotnet publish -c Release -r win-x64 --no-self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version }} -o publish/fd

      - name: Rename framework-dependent exe
        shell: pwsh
        run: Copy-Item publish/fd/ConanModsSort.exe "ConanModsSort-${{ steps.ver.outputs.version }}-win-x64.exe" -Force

      # Вариант 2: self-contained, ОДИН файл (рантайм не нужен)
      - name: Publish self-contained (single-file)
        run: >
          dotnet publish -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.ver.outputs.version }} -o publish/sc

      - name: Rename standalone exe
        shell: pwsh
        run: Copy-Item publish/sc/ConanModsSort.exe "ConanModsSort-${{ steps.ver.outputs.version }}-win-x64-standalone.exe" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ConanModsSort-${{ steps.ver.outputs.version }}
          path: |
            ConanModsSort-${{ steps.ver.outputs.version }}-win-x64.exe
            ConanModsSort-${{ steps.ver.outputs.version }}-win-x64-standalone.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ConanModsSort-${{ steps.ver.outputs.version }}-win-x64.exe
            ConanModsSort-${{ steps.ver.outputs.version }}-win-x64-standalone.exe
